<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auritaker — Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0b0f1a;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated background grid */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
        }

        /* Glowing orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            animation: float 8s ease-in-out infinite;
        }
        .orb-1 {
            width: 400px; height: 400px;
            background: rgba(99,102,241,0.12);
            top: -100px; left: -100px;
            animation-delay: 0s;
        }
        .orb-2 {
            width: 300px; height: 300px;
            background: rgba(139,92,246,0.08);
            bottom: -80px; right: -80px;
            animation-delay: 4s;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }

        /* Card */
        .card {
            position: relative;
            z-index: 10;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow:
                0 0 0 1px rgba(99,102,241,0.1),
                0 25px 50px rgba(0,0,0,0.5),
                inset 0 1px 0 rgba(255,255,255,0.05);
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Logo */
        .logo {
            width: 52px; height: 52px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            margin: 0 auto 20px;
            box-shadow: 0 0 30px rgba(99,102,241,0.4);
            animation: pulse-glow 3s ease-in-out infinite;
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(99,102,241,0.3); }
            50%       { box-shadow: 0 0 40px rgba(99,102,241,0.6); }
        }

        /* Input */
        .input-group { position: relative; margin-bottom: 16px; }
        .input-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 8px;
        }
        .input-group input {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 14px;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        .input-group input::placeholder { color: #334155; }
        .input-group input:focus {
            border-color: rgba(99,102,241,0.6);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
            background: rgba(99,102,241,0.05);
        }

        /* Button */
        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, #4f46e5, #6d28d9);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 13px;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(99,102,241,0.4);
        }
        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        /* Shimmer on button */
        .btn-primary::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: translateX(-100%);
            transition: transform 0.4s;
        }
        .btn-primary:hover::after { transform: translateX(100%); }

        /* Error */
        .error-msg {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 13px;
            color: #f87171;
            margin-top: 12px;
            display: none;
            animation: shake 0.4s ease;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            color: #334155;
            font-size: 12px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.06);
        }

        /* Demo badge */
        .demo-badge {
            background: rgba(99,102,241,0.08);
            border: 1px solid rgba(99,102,241,0.2);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 12px;
            color: #818cf8;
            font-family: 'Courier New', monospace;
            letter-spacing: 0.02em;
        }
        .demo-badge span { color: #a5b4fc; font-weight: 600; }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="card">
        <div class="logo">⚡</div>

        <h1 style="font-size:22px; font-weight:700; color:white; text-align:center; margin-bottom:6px;">
            Auritaker AI
        </h1>
        <p style="font-size:13px; color:#64748b; text-align:center; margin-bottom:28px;">
            High-Intelligence AI Assistant
        </p>

        <form method="POST" action="/login" id="login-form">
            <div class="input-group">
                <label>Email</label>
                <input type="email" name="username" placeholder="Enter your email" required autofocus>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn-primary" id="submit-btn">
                <span id="btn-text">Sign In</span>
            </button>

            {% if error %}
            <div class="error-msg" style="display:block;">
                <i class="fas fa-exclamation-circle" style="margin-right:6px;"></i>{{ error }}
            </div>
            {% endif %}

            <div id="js-error" class="error-msg"></div>
        </form>

        <div class="divider">demo access</div>

        <div class="demo-badge">
            <div style="margin-bottom:4px;">
                <i class="fas fa-envelope" style="margin-right:6px; opacity:0.6;"></i>
                <span>aryanzubin123@gmail.com</span>
            </div>
            <div>
                <i class="fas fa-key" style="margin-right:6px; opacity:0.6;"></i>
                <span>password123</span>
            </div>
        </div>
    </div>

    <script>
        // Auto-fill demo credentials on badge click
        document.querySelector('.demo-badge').style.cursor = 'pointer';
        document.querySelector('.demo-badge').title = 'Click to autofill';
        document.querySelector('.demo-badge').onclick = () => {
            document.querySelector('input[name="username"]').value = 'aryanzubin123@gmail.com';
            document.querySelector('input[name="password"]').value = 'password123';
            document.querySelector('input[name="password"]').focus();
        };

        // Loading state on submit
        document.getElementById('login-form').onsubmit = () => {
            const btn = document.getElementById('submit-btn');
            const txt = document.getElementById('btn-text');
            btn.disabled = true;
            txt.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-right:6px;"></i>Signing in...';
        };
    </script>
</body>
</html>
