<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auritaker AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg:        #080c14;
            --surface:   #0e1420;
            --border:    rgba(255,255,255,0.06);
            --accent:    #4f8eff;
            --accent2:   #7b5ea7;
            --text:      #d4ddf0;
            --muted:     #4a5568;
            --user-bg:   #1a2540;
            --ai-bg:     #0e1420;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Core Sidebar Layout Adjustments */
        .sidebar {
            width: 280px;
            background: #05080e;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
        }

        .sidebar-brand {
    padding: 24px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 20px;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #fff, var(--accent));
    
    /* Vendor prefixed version for older webkit engines */
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    
    /* Standard property for modern browser compatibility */
    background-clip: text; 
    
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
}
        .close-sidebar-btn {
            display: none;
            background: none;
            border: none;
            color: var(--text);
            font-size: 20px;
            cursor: pointer;
            opacity: 0.6;
        }
        .close-sidebar-btn:hover { opacity: 1; }

        .new-chat-btn {
            margin: 16px;
            padding: 12px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.2s;
        }
        .new-chat-btn:hover { opacity: 0.9; }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 12px;
        }

        .history-item {
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 14px;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .history-item:hover { background: rgba(255,255,255,0.03); }
        .history-item.active {
            background: rgba(79, 142, 255, 0.08);
            border-color: rgba(79, 142, 255, 0.2);
            color: #fff;
        }

        .delete-chat-btn {
            opacity: 0;
            background: none;
            border: none;
            color: #ff4a6b;
            cursor: pointer;
        }
        .history-item:hover .delete-chat-btn { opacity: 0.7; }
        .delete-chat-btn:hover { opacity: 1 !important; }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid var(--border);
        }

        .logout-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ff4a6b;
            text-decoration: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 500;
            font-size: 14px;
        }
        .logout-btn:hover { background: rgba(255,74,107,0.06); }

        /* Main Workspace Section */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Top Bar Header with Hamburger Toggler Menu */
        .top-navbar {
            height: 64px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 24px;
            gap: 16px;
            background: rgba(8, 12, 20, 0.5);
            backdrop-filter: blur(12px);
        }

        .hamburger-menu-btn {
            background: none;
            border: none;
            color: var(--text);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            transition: background 0.2s;
        }
        .hamburger-menu-btn:hover {
            background: rgba(255,255,255,0.05);
        }

        .header-chat-title {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 16px;
            color: #fff;
        }

        /* Chat Panel Box Area */
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .message-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 80%;
            animation: fadeIn 0.3s ease;
        }
        .message-wrapper.user { align-self: flex-end; }
        .message-wrapper.assistant { align-self: flex-start; }

        .message-sender {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
            opacity: 0.4;
            padding: 0 4px;
        }
        .user .message-sender { text-align: right; }

        .message-bubble {
            padding: 16px 20px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.6;
        }
        .user .message-bubble {
            background: linear-gradient(135deg, var(--user-bg), #24355a);
            border: 1px solid rgba(255,255,255,0.04);
            border-bottom-right-radius: 4px;
            color: #fff;
        }
        .assistant .message-bubble {
            background: var(--ai-bg);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        /* Input Controls Area */
        .input-container {
            padding: 24px;
            background: linear-gradient(to top, var(--bg) 80%, transparent);
        }

        .input-bar-wrapper {
            max-width: 840px;
            margin: 0 auto;
            position: relative;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            display: flex;
            align-items: center;
            padding: 8px 12px;
            transition: border-color 0.2s;
        }
        .input-bar-wrapper:focus-within {
            border-color: rgba(79, 142, 255, 0.3);
        }

        .input-bar-wrapper input {
            flex: 1;
            background: none;
            border: none;
            color: var(--text);
            padding: 12px;
            font-size: 15px;
            outline: none;
            font-family: inherit;
        }

        .send-btn {
            background: var(--accent);
            color: #000;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .send-btn:hover {
            transform: scale(1.04);
            background: #fff;
        }
        .send-btn:disabled {
            opacity: 0.3;
            transform: none;
            cursor: not-allowed;
        }

        /* Screen Overlay when Sidebar open on Mobile */
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 999;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

        /* Responsive Mobile Layout Toggles */
        @media (max-width: 868px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                transform: translateX(-100%);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .close-sidebar-btn {
                display: block;
            }
            .sidebar-overlay.active {
                display: block;
            }
        }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <span>AURITAKER AI</span>
            <button class="close-sidebar-btn" onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
        </div>
        <button class="new-chat-btn" onclick="createNewChat()">
            <i class="fas fa-plus"></i> New Chat
        </button>
        <div class="history-list" id="history-list">
            </div>
        <div class="sidebar-footer">
            <a href="/logout" class="logout-btn">
                <i class="fas fa-sign-out-alt"></i> Log Out
            </a>
        </div>
    </aside>

    <div class="main-container">
        <header class="top-navbar">
            <button class="hamburger-menu-btn" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>
            </button>
            <h1 class="header-chat-title" id="current-chat-title">New Chat</h1>
        </header>

        <div class="chat-box" id="chat-box"></div>

        <div class="input-container">
            <div class="input-bar-wrapper">
                <input type="text" id="user-input" placeholder="Message Auritaker..." onkeydown="if(event.key==='Enter') sendMessage()">
                <button class="send-btn" id="send-btn" onclick="sendMessage()">
                    <i class="fas fa-arrow-up"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "";
        let allChats = JSON.parse(localStorage.getItem('auritaker_history')) || [];
        let currentChatId = localStorage.getItem('auritaker_current_id') || null;
        let isLoading = false;

        // Toggle Sidebar view mechanics
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        }

        function createNewChat() {
            const id = 'chat_' + Date.now();
            currentChatId = id;
            allChats.unshift({ id: id, title: 'New Chat', messages: [] });
            localStorage.setItem('auritaker_history', JSON.stringify(allChats));
            localStorage.setItem('auritaker_current_id', currentChatId);
            renderHistory();
            loadCurrentChat();
            
            // Close sidebar on mobile layouts after creating a chat
            if(window.innerWidth <= 868) {
                toggleSidebar();
            }
        }

        function renderHistory() {
            const container = document.getElementById('history-list');
            container.innerHTML = '';
            allChats.forEach(chat => {
                const item = document.createElement('div');
                item.className = `history-item ${chat.id === currentChatId ? 'active' : ''}`;
                item.onclick = () => {
                    currentChatId = chat.id;
                    localStorage.setItem('auritaker_current_id', currentChatId);
                    renderHistory();
                    loadCurrentChat();
                    if(window.innerWidth <= 868) toggleSidebar();
                };

                const span = document.createElement('span');
                span.innerText = chat.title;
                item.appendChild(span);

                const delBtn = document.createElement('button');
                delBtn.className = 'delete-chat-btn';
                delBtn.innerHTML = '<i class="far fa-trash-alt"></i>';
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    allChats = allChats.filter(c => c.id !== chat.id);
                    localStorage.setItem('auritaker_history', JSON.stringify(allChats));
                    if (currentChatId === chat.id) {
                        currentChatId = allChats.length ? allChats[0].id : null;
                        localStorage.setItem('auritaker_current_id', currentChatId);
                    }
                    renderHistory();
                    loadCurrentChat();
                };
                item.appendChild(delBtn);
                container.appendChild(item);
            });
        }

        function loadCurrentChat() {
            const box = document.getElementById('chat-box');
            box.innerHTML = '';
            
            if (!currentChatId) {
                document.getElementById('current-chat-title').innerText = 'No Chat Selected';
                return;
            }

            const chat = allChats.find(c => c.id === currentChatId);
            if (!chat) return;

            document.getElementById('current-chat-title').innerText = chat.title;

            if (chat.messages.length === 0) {
                box.innerHTML = `<div style="margin: auto; text-align: center; max-width: 400px; opacity: 0.25;">
                    <i class="fas fa-robot" style="font-size: 48px; margin-bottom: 16px;"></i>
                    <p style="font-family:'Syne', sans-serif; font-weight:600;">How can I help you today?</p>
                </div>`;
                return;
            }

            chat.messages.forEach(m => appendMessage(m.role, m.text));
        }

        function appendMessage(role, text) {
            const box = document.getElementById('chat-box');
            
            // Remove welcoming message placeholder if it exists
            if (box.querySelector('.fa-robot')) box.innerHTML = '';

            const wrap = document.createElement('div');
            wrap.className = `message-wrapper ${role}`;

            const sender = document.createElement('div');
            sender.className = 'message-sender';
            sender.innerText = role === 'user' ? 'You' : 'Auritaker';

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.innerText = text;

            wrap.appendChild(sender);
            wrap.appendChild(bubble);
            box.appendChild(wrap);
            box.scrollTop = box.scrollHeight;
        }

        function showTyping() {
            const box = document.getElementById('chat-box');
            const wrap = document.createElement('div');
            wrap.className = 'message-wrapper assistant';
            wrap.id = 'typing-indicator';

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.style.opacity = '0.5';
            bubble.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Auritaker is thinking...';

            wrap.appendChild(bubble);
            box.appendChild(wrap);
            box.scrollTop = box.scrollHeight;
        }

        function removeTyping() {
            const el = document.getElementById('typing-indicator');
            if (el) el.remove();
        }

        // Auto-Generate Title function workflow
        async function checkAndGenerateTitle(chat, firstMessageText) {
            try {
                const res = await fetch(`${API_URL}/generate_title`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: firstMessageText }),
                    credentials: 'include'
                });
                const data = await res.json();
                if (data.title) {
                    chat.title = data.title;
                    localStorage.setItem('auritaker_history', JSON.stringify(allChats));
                    if (chat.id === currentChatId) {
                        document.getElementById('current-chat-title').innerText = data.title;
                    }
                    renderHistory();
                }
            } catch (err) {
                console.error("Title generation request failed", err);
            }
        }

        async function sendMessage() {
            if (isLoading) return;
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text) return;

            if (!currentChatId) {
                allChats.unshift({ id: 'chat_' + Date.now(), title: 'New Chat', messages: [] });
                currentChatId = allChats[0].id;
                localStorage.setItem('auritaker_current_id', currentChatId);
            }

            const chat = allChats.find(c => c.id === currentChatId);
            const isFirstQuery = chat.messages.length === 0;

            appendMessage('user', text);
            chat.messages.push({ role: 'user', text: text });
            input.value = '';
            renderHistory();

            isLoading = true;
            document.getElementById('send-btn').disabled = true;
            showTyping();

            // Fire the Title generator immediately in the background if it's the first query
            if (isFirstQuery) {
                checkAndGenerateTitle(chat, text);
            }

            try {
                const res = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text }),
                    credentials: 'include'
                });
                const data = await res.json();
                removeTyping();

                if (res.ok && data.response) {
                    appendMessage('assistant', data.response);
                    chat.messages.push({ role: 'assistant', text: data.response });
                    localStorage.setItem('auritaker_history', JSON.stringify(allChats));
                } else {
                    appendMessage('assistant', '❌ ' + (data.response || 'Something went wrong'));
                }
            } catch (err) {
                removeTyping();
                appendMessage('assistant', '❌ Connection error. Is the server running?');
            } finally {
                isLoading = false;
                document.getElementById('send-btn').disabled = false;
            }
        }

        // Initialize view states on load
        if (allChats.length === 0) {
            createNewChat();
        } else {
            if (!currentChatId || !allChats.some(c => c.id === currentChatId)) {
                currentChatId = allChats[0].id;
                localStorage.setItem('auritaker_current_id', currentChatId);
            }
            renderHistory();
            loadCurrentChat();
        }
    </script>
</body>
</html>
