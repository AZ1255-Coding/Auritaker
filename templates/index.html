<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auritaker AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg:        #080c14;
            --surface:   #0e1420;
            --border:    rgba(255,255,255,0.06);
            --accent:    #4f8eff;
            --accent2:   #7b5ea7;
            --text:      #d4ddf0;
            --muted:     #4a5568;
            --user-bg:   #1a2540;
            --ai-bg:     #0e1420;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* ── Noise texture overlay ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
            opacity: 0.4;
        }

        /* ── Ambient glow ── */
        .ambient {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 0;
        }
        .ambient-1 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(79,142,255,0.07) 0%, transparent 70%);
            top: -150px; left: -100px;
            animation: drift1 20s ease-in-out infinite;
        }
        .ambient-2 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(123,94,167,0.06) 0%, transparent 70%);
            bottom: -100px; right: -100px;
            animation: drift2 25s ease-in-out infinite;
        }
        @keyframes drift1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(40px,30px)} }
        @keyframes drift2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-30px,-20px)} }

        /* ══════════════════════════════
           SIDEBAR
        ══════════════════════════════ */
        #sidebar {
            position: relative;
            z-index: 10;
            width: 260px;
            min-width: 260px;
            height: 100vh;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
        }

        .sidebar-header {
            padding: 20px 16px 16px;
            border-bottom: 1px solid var(--border);
        }

        .logo-mark {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }
        .logo-icon {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
            box-shadow: 0 0 20px rgba(79,142,255,0.3);
        }
        .logo-text {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 15px;
            color: white;
            letter-spacing: 0.02em;
        }
        .logo-text span {
            color: var(--accent);
        }

        .new-chat-btn {
            width: 100%;
            background: rgba(79,142,255,0.1);
            border: 1px solid rgba(79,142,255,0.2);
            color: var(--accent);
            border-radius: 10px;
            padding: 9px 14px;
            font-size: 13px;
            font-weight: 500;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .new-chat-btn:hover {
            background: rgba(79,142,255,0.18);
            border-color: rgba(79,142,255,0.4);
            transform: translateY(-1px);
        }

        /* History */
        #history-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px 10px;
        }
        #history-list::-webkit-scrollbar { width: 3px; }
        #history-list::-webkit-scrollbar-thumb { background: #1e2a3a; border-radius: 10px; }

        .history-section-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
            padding: 8px 6px 4px;
        }

        .chat-item {
            padding: 8px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            color: #6b7a99;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.15s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }
        .chat-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
        .chat-item.active {
            background: rgba(79,142,255,0.1);
            color: #a8c4ff;
            border: 1px solid rgba(79,142,255,0.15);
        }
        .chat-item i { font-size: 11px; opacity: 0.6; flex-shrink: 0; }

        /* Sidebar footer */
        .sidebar-footer {
            padding: 12px 10px;
            border-top: 1px solid var(--border);
        }
        .clear-btn {
            width: 100%;
            background: none;
            border: none;
            color: #3d4f6e;
            font-size: 12px;
            font-family: 'DM Sans', sans-serif;
            padding: 8px 10px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.15s;
            margin-bottom: 8px;
        }
        .clear-btn:hover { background: rgba(239,68,68,0.08); color: #f87171; }

        .user-chip {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            border: 1px solid var(--border);
        }
        .avatar {
            width: 30px; height: 30px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
        }
        .user-info { flex: 1; min-width: 0; }
        .user-email {
            font-size: 11px;
            color: #8899bb;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .user-plan {
            font-size: 10px;
            color: var(--muted);
        }
        .logout-btn {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            transition: color 0.15s;
            font-size: 13px;
        }
        .logout-btn:hover { color: #f87171; }

        /* ══════════════════════════════
           MAIN
        ══════════════════════════════ */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            position: relative;
            z-index: 1;
        }

        /* Top bar */
        .topbar {
            height: 56px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid var(--border);
            gap: 12px;
            flex-shrink: 0;
        }
        .menu-btn {
            display: none;
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            width: 36px; height: 36px;
            border-radius: 8px;
            align-items: center; justify-content: center;
            font-size: 14px;
            transition: all 0.15s;
        }
        .menu-btn:hover { background: rgba(255,255,255,0.05); color: var(--text); }

        #current-chat-title {
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: #8899bb;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .model-badge {
            background: rgba(79,142,255,0.08);
            border: 1px solid rgba(79,142,255,0.15);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 11px;
            color: #5a8adf;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .model-badge::before {
            content: '';
            width: 6px; height: 6px;
            background: #4f8eff;
            border-radius: 50%;
            animation: blink 2s ease-in-out infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

        /* Chat box */
        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 32px 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-thumb { background: #1a2540; border-radius: 10px; }

        .chat-inner {
            max-width: 720px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Welcome */
        .welcome {
            text-align: center;
            padding: 60px 20px 20px;
            animation: fadeIn 0.6s ease both;
        }
        .welcome-icon {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, rgba(79,142,255,0.15), rgba(123,94,167,0.15));
            border: 1px solid rgba(79,142,255,0.2);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
            font-size: 26px;
        }
        .welcome h2 {
            font-family: 'Syne', sans-serif;
            font-size: 26px;
            font-weight: 800;
            color: white;
            margin-bottom: 8px;
        }
        .welcome p { font-size: 14px; color: var(--muted); }

        .suggestion-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 28px;
        }
        .suggestion {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
        }
        .suggestion:hover {
            border-color: rgba(79,142,255,0.3);
            background: rgba(79,142,255,0.05);
            transform: translateY(-2px);
        }
        .suggestion-icon { font-size: 16px; margin-bottom: 6px; }
        .suggestion-text { font-size: 13px; color: #8899bb; line-height: 1.4; }

        /* Messages */
        .message {
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s ease both;
        }
        @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

        .message.user { flex-direction: row-reverse; }

        .msg-avatar {
            width: 30px; height: 30px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px;
            flex-shrink: 0;
            margin-top: 2px;
        }
        .msg-avatar.ai {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            font-weight: 700;
            box-shadow: 0 0 12px rgba(79,142,255,0.25);
        }
        .msg-avatar.user-av {
            background: #1a2540;
            border: 1px solid rgba(79,142,255,0.2);
            color: #6b9fff;
        }

        .msg-bubble {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.65;
        }
        .message.user .msg-bubble {
            background: var(--user-bg);
            border: 1px solid rgba(79,142,255,0.15);
            color: #c8d8f5;
            border-radius: 16px 4px 16px 16px;
        }
        .message.ai .msg-bubble {
            background: var(--ai-bg);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 4px 16px 16px 16px;
        }

        /* Typing indicator */
        .typing-dots {
            display: flex;
            gap: 5px;
            padding: 4px 0;
            align-items: center;
        }
        .typing-dots span {
            width: 7px; height: 7px;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0.4;
            animation: dot 1.4s ease-in-out infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dot { 0%,60%,100%{opacity:0.2;transform:scale(0.8)} 30%{opacity:1;transform:scale(1.1)} }

        /* ══════════════════════════════
           INPUT AREA
        ══════════════════════════════ */
        .input-area {
            padding: 16px 20px 20px;
            flex-shrink: 0;
        }
        .input-wrap {
            max-width: 720px;
            margin: 0 auto;
        }
        .input-box {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 10px 10px 10px 16px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-box:focus-within {
            border-color: rgba(79,142,255,0.4);
            box-shadow: 0 0 0 3px rgba(79,142,255,0.07);
        }
        #user-input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text);
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            resize: none;
            max-height: 160px;
            min-height: 24px;
            line-height: 1.5;
            padding: 3px 0;
        }
        #user-input::placeholder { color: #2d3d5a; }

        #send-btn {
            width: 38px; height: 38px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px;
            flex-shrink: 0;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(79,142,255,0.3);
        }
        #send-btn:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(79,142,255,0.4); }
        #send-btn:active { transform: scale(0.95); }
        #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

        .input-hint {
            font-size: 11px;
            color: #2a3a55;
            text-align: center;
            margin-top: 8px;
        }

        #error-msg {
            font-size: 12px;
            color: #f87171;
            text-align: center;
            margin-top: 8px;
            display: none;
        }

        /* ── Mobile ── */
        @media (max-width: 768px) {
            #sidebar {
                position: fixed;
                left: 0; top: 0;
                z-index: 100;
                transform: translateX(-100%);
            }
            #sidebar.open { transform: translateX(0); }
            .menu-btn { display: flex; }
            .suggestion-grid { grid-template-columns: 1fr; }
            .msg-bubble { max-width: 88%; }
        }

        /* Overlay for mobile */
        #overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 99;
            backdrop-filter: blur(2px);
        }
        #overlay.show { display: block; }
    </style>
</head>
<body>
    <div class="ambient ambient-1"></div>
    <div class="ambient ambient-2"></div>
    <div id="overlay" onclick="toggleSidebar()"></div>

    <!-- ── SIDEBAR ── -->
    <aside id="sidebar">
        <div class="sidebar-header">
            <div class="logo-mark">
                <div class="logo-icon">⚡</div>
                <div class="logo-text">Auri<span>taker</span></div>
            </div>
            <button class="new-chat-btn" onclick="newChat()">
                <i class="fas fa-plus"></i> New Chat
            </button>
        </div>

        <div id="history-list">
            <!-- filled by JS -->
        </div>

        <div class="sidebar-footer">
            <button class="clear-btn" onclick="clearAllHistory()">
                <i class="fas fa-trash-alt"></i> Clear history
            </button>
            <div class="user-chip">
                <div class="avatar">A</div>
                <div class="user-info">
                    <div class="user-email" id="user-email">User</div>
                    <div class="user-plan">Auritaker v1</div>
                </div>
                <button class="logout-btn" onclick="logout()" title="Sign out">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </aside>

    <!-- ── MAIN ── -->
    <main>
        <header class="topbar">
            <button class="menu-btn" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>
            </button>
            <div id="current-chat-title">Auritaker AI</div>
            <div class="model-badge">Auto · Free</div>
        </header>

        <div id="chat-box">
            <div class="chat-inner" id="chat-inner">
                <div class="welcome" id="welcome-screen">
                    <div class="welcome-icon">⚡</div>
                    <h2>What's on your mind?</h2>
                    <p>Ask me anything — I search the web when needed.</p>
                    <div class="suggestion-grid">
                        <button class="suggestion" onclick="useSuggestion(this)">
                            <div class="suggestion-icon">🌐</div>
                            <div class="suggestion-text">What's happening in tech today?</div>
                        </button>
                        <button class="suggestion" onclick="useSuggestion(this)">
                            <div class="suggestion-icon">💡</div>
                            <div class="suggestion-text">Explain quantum computing simply</div>
                        </button>
                        <button class="suggestion" onclick="useSuggestion(this)">
                            <div class="suggestion-icon">✍️</div>
                            <div class="suggestion-text">Help me write a cold email</div>
                        </button>
                        <button class="suggestion" onclick="useSuggestion(this)">
                            <div class="suggestion-icon">🎵</div>
                            <div class="suggestion-text">Find me a song like Blinding Lights</div>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrap">
                <div class="input-box">
                    <textarea id="user-input" placeholder="Ask anything..." rows="1" autocomplete="off"></textarea>
                    <button id="send-btn" onclick="sendMessage()">
                        <i class="fas fa-arrow-up"></i>
                    </button>
                </div>
                <div class="input-hint">Auritaker · Web-enhanced · Powered by OpenRouter</div>
                <div id="error-msg"></div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = 'https://auritaker.onrender.com';
        let currentChatId = null;
        let allChats = JSON.parse(localStorage.getItem('auritaker_history')) || [];
        let isLoading = false;

        // ── Init ──
        const email = localStorage.getItem('auritaker_user');
        if (email) {
            document.getElementById('user-email').innerText = email;
        }
        renderHistory();

        // ── Auto-resize textarea ──
        const textarea = document.getElementById('user-input');
        textarea.addEventListener('input', () => {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 160) + 'px';
        });
        textarea.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // ── Sidebar ──
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }

        // ── Suggestions ──
        function useSuggestion(el) {
            textarea.value = el.querySelector('.suggestion-text').innerText;
            textarea.dispatchEvent(new Event('input'));
            sendMessage();
        }

        // ── Logout ──
        function logout() {
            fetch(`${API_URL}/logout`, { credentials: 'include' });
            localStorage.removeItem('auritaker_logged_in');
            localStorage.removeItem('auritaker_user');
            window.location.href = `${API_URL}/login`;
        }

        // ── History ──
        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            if (!allChats.length) {
                list.innerHTML = '<p style="font-size:12px;color:#2d3d5a;padding:12px 10px;">No chats yet</p>';
                return;
            }
            list.innerHTML = '<div class="history-section-label">Recent</div>';
            allChats.slice().reverse().forEach(chat => {
                const div = document.createElement('div');
                div.className = `chat-item ${chat.id === currentChatId ? 'active' : ''}`;
                div.innerHTML = `<i class="far fa-message"></i><span style="overflow:hidden;text-overflow:ellipsis;">${chat.title}</span>`;
                div.onclick = () => {
                    loadChat(chat.id);
                    if (window.innerWidth < 768) toggleSidebar();
                };
                list.appendChild(div);
            });
        }

        function clearAllHistory() {
            if (confirm('Delete all chat history?')) {
                allChats = [];
                localStorage.removeItem('auritaker_history');
                newChat();
            }
        }

        function newChat() {
            currentChatId = null;
            const inner = document.getElementById('chat-inner');
            inner.innerHTML = `
                <div class="welcome" id="welcome-screen">
                    <div class="welcome-icon">⚡</div>
                    <h2>What's on your mind?</h2>
                    <p>Ask me anything — I search the web when needed.</p>
                    <div class="suggestion-grid">
                        <button class="suggestion" onclick="useSuggestion(this)">
                            <div class="suggestion-icon">🌐</div>
                            <div class="suggestion-text">What's happening in tech today?</div>
                        </button>
                        <button class="suggestion" onclick="useSuggestion(this)">
                            <div class="suggestion-icon">💡</div>
                            <div class="suggestion-text">Explain quantum computing simply</div>
                        </button>
                        <button class="suggestion" onclick="useSuggestion(this)">
                            <div class="suggestion-icon">✍️</div>
                            <div class="suggestion-text">Help me write a cold email</div>
                        </button>
                        <button class="suggestion" onclick="useSuggestion(this)">
                            <div class="suggestion-icon">🎵</div>
                            <div class="suggestion-text">Find me a song like Blinding Lights</div>
                        </button>
                    </div>
                </div>`;
            document.getElementById('current-chat-title').innerText = 'Auritaker AI';
            renderHistory();
        }

        function loadChat(id) {
            currentChatId = id;
            const chat = allChats.find(c => c.id === id);
            document.getElementById('current-chat-title').innerText = chat.title;
            const inner = document.getElementById('chat-inner');
            inner.innerHTML = '';
            chat.messages.forEach(m => appendMessage(m.role, m.text));
            renderHistory();
        }

        // ── Messages ──
        function appendMessage(role, text) {
            const welcome = document.getElementById('welcome-screen');
            if (welcome) welcome.remove();

            const inner = document.getElementById('chat-inner');
            const wrap = document.createElement('div');
            wrap.className = `message ${role === 'user' ? 'user' : 'ai'}`;

            const avatarHTML = role === 'user'
                ? `<div class="msg-avatar user-av"><i class="fas fa-user" style="font-size:11px;"></i></div>`
                : `<div class="msg-avatar ai">A</div>`;

            // Basic markdown: bold, code, line breaks
            let formatted = text
                .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/`([^`]+)`/g, '<code style="background:rgba(79,142,255,0.1);padding:2px 6px;border-radius:4px;font-size:12px;color:#7eb3ff;">$1</code>')
                .replace(/\n/g, '<br>');

            wrap.innerHTML = `${avatarHTML}<div class="msg-bubble">${formatted}</div>`;
            inner.appendChild(wrap);
            document.getElementById('chat-box').scrollTop = 99999;
        }

        function showTyping() {
            const welcome = document.getElementById('welcome-screen');
            if (welcome) welcome.remove();
            const inner = document.getElementById('chat-inner');
            const wrap = document.createElement('div');
            wrap.className = 'message ai';
            wrap.id = 'typing-indicator';
            wrap.innerHTML = `<div class="msg-avatar ai">A</div><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
            inner.appendChild(wrap);
            document.getElementById('chat-box').scrollTop = 99999;
        }

        function removeTyping() {
            const t = document.getElementById('typing-indicator');
            if (t) t.remove();
        }

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.innerText = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 5000);
        }

        // ── Send ──
        async function sendMessage() {
            if (isLoading) return;
            const text = textarea.value.trim();
            if (!text) return;

            if (!currentChatId) currentChatId = Date.now();

            appendMessage('user', text);

            let chat = allChats.find(c => c.id === currentChatId);
            if (!chat) {
                chat = { id: currentChatId, title: text.substring(0, 32), messages: [] };
                allChats.push(chat);
            }
            chat.messages.push({ role: 'user', text });
            localStorage.setItem('auritaker_history', JSON.stringify(allChats));

            textarea.value = '';
            textarea.style.height = 'auto';
            renderHistory();

            isLoading = true;
            document.getElementById('send-btn').disabled = true;
            showTyping();

            try {
                const res = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text }),
                    credentials: 'include'
                });
                const data = await res.json();
                removeTyping();

                if (res.ok && data.response) {
                    appendMessage('assistant', data.response);
                    chat.messages.push({ role: 'assistant', text: data.response });
                    localStorage.setItem('auritaker_history', JSON.stringify(allChats));
                    document.getElementById('current-chat-title').innerText = chat.title;
                } else {
                    appendMessage('assistant', '❌ ' + (data.response || 'Something went wrong'));
                    showError(data.response || 'Error');
                }
            } catch (err) {
                removeTyping();
                appendMessage('assistant', '❌ Connection error. Is the server running?');
                showError('Connection error: ' + err.message);
            } finally {
                isLoading = false;
                document.getElementById('send-btn').disabled = false;
            }
        }
    </script>
</body>
</html>
