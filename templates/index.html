<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auritaker AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #080c14;
            --surface: #0e1420;
            --border: rgba(255,255,255,0.06);
            --accent: #4f8eff;
            --accent2: #7b5ea7;
            --text: #d4ddf0;
            --muted: #4a5568;
            --user-bg: #1a2540;
            --ai-bg: #0e1420;
            --danger: #f87171;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; height: 100vh; display: flex; overflow: hidden; }
        body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E"); pointer-events: none; z-index: 9999; opacity: 0.4; }
        .ambient { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; }
        .ambient-1 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(79,142,255,0.07) 0%, transparent 70%); top: -150px; left: -100px; animation: drift1 20s ease-in-out infinite; }
        .ambient-2 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(123,94,167,0.06) 0%, transparent 70%); bottom: -100px; right: -100px; animation: drift2 25s ease-in-out infinite; }
        @keyframes drift1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(40px,30px)} }
        @keyframes drift2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-30px,-20px)} }

        #sidebar { position: relative; z-index: 10; width: 260px; min-width: 260px; height: 100vh; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); }
        .sidebar-header { padding: 18px 14px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .logo-mark { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
        .logo-icon { width: 30px; height: 30px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; box-shadow: 0 0 16px rgba(79,142,255,0.3); }
        .logo-text { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; color: white; }
        .logo-text span { color: var(--accent); }
        .sidebar-actions { display: flex; gap: 8px; }
        .new-chat-btn { flex: 1; background: rgba(79,142,255,0.1); border: 1px solid rgba(79,142,255,0.2); color: var(--accent); border-radius: 8px; padding: 8px 12px; font-size: 12px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.2s; }
        .new-chat-btn:hover { background: rgba(79,142,255,0.18); border-color: rgba(79,142,255,0.4); }
        .new-project-btn { background: rgba(255,255,255,0.04); border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 8px 10px; font-size: 12px; font-family: 'DM Sans', sans-serif; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all 0.2s; white-space: nowrap; }
        .new-project-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }
        #history-list { flex: 1; overflow-y: auto; padding: 8px; }
        #history-list::-webkit-scrollbar { width: 3px; }
        #history-list::-webkit-scrollbar-thumb { background: #1e2a3a; border-radius: 10px; }
        .section-label { font-family: 'DM Mono', monospace; font-size: 9px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); padding: 10px 6px 4px; }
        .project-group { margin-bottom: 4px; }
        .project-header { display: flex; align-items: center; gap: 6px; padding: 7px 8px; border-radius: 8px; cursor: pointer; transition: all 0.15s; user-select: none; position: relative; }
        .project-header:hover { background: rgba(255,255,255,0.04); }
        .project-header:hover .item-menu-btn { opacity: 1; }
        .project-chevron { font-size: 9px; color: var(--muted); transition: transform 0.2s; width: 10px; flex-shrink: 0; }
        .project-group.open .project-chevron { transform: rotate(90deg); }
        .project-icon { font-size: 12px; flex-shrink: 0; }
        .project-name { flex: 1; font-size: 12px; font-weight: 500; color: #8899bb; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .project-count { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); background: rgba(255,255,255,0.05); padding: 1px 5px; border-radius: 10px; }
        .project-chats { padding-left: 20px; display: none; }
        .project-group.open .project-chats { display: block; }
        .chat-item { display: flex; align-items: center; gap: 7px; padding: 7px 8px; border-radius: 8px; cursor: pointer; font-size: 12px; color: #6b7a99; transition: all 0.15s; margin-bottom: 1px; position: relative; user-select: none; }
        .chat-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
        .chat-item:hover .item-menu-btn { opacity: 1; }
        .chat-item.active { background: rgba(79,142,255,0.1); color: #a8c4ff; border: 1px solid rgba(79,142,255,0.15); }
        .chat-item.active .item-menu-btn { opacity: 1; }
        .chat-item i.chat-icon { font-size: 10px; opacity: 0.5; flex-shrink: 0; }
        .chat-title { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-menu-btn { opacity: 0; background: none; border: none; color: var(--muted); cursor: pointer; padding: 2px 4px; border-radius: 4px; font-size: 11px; transition: all 0.15s; flex-shrink: 0; line-height: 1; }
        .item-menu-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }
        .ctx-menu { position: fixed; background: #0e1828; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 4px; z-index: 1000; min-width: 160px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); animation: ctxFade 0.15s ease both; }
        @keyframes ctxFade { from{opacity:0;transform:scale(0.95)} to{opacity:1;transform:scale(1)} }
        .ctx-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; color: #8899bb; transition: all 0.1s; font-family: 'DM Sans', sans-serif; }
        .ctx-item:hover { background: rgba(255,255,255,0.06); color: var(--text); }
        .ctx-item.danger { color: var(--danger); }
        .ctx-item.danger:hover { background: rgba(248,113,113,0.08); }
        .ctx-item i { width: 14px; text-align: center; font-size: 11px; }
        .ctx-divider { height: 1px; background: var(--border); margin: 3px 0; }
        .sidebar-footer { padding: 10px 8px; border-top: 1px solid var(--border); flex-shrink: 0; }
        .user-chip { display: flex; align-items: center; gap: 10px; padding: 8px 10px; background: rgba(255,255,255,0.03); border-radius: 10px; border: 1px solid var(--border); }
        .avatar { width: 28px; height: 28px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: white; flex-shrink: 0; }
        .user-info { flex: 1; min-width: 0; }
        .user-email { font-size: 11px; color: #8899bb; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-plan { font-size: 10px; color: var(--muted); }
        .logout-btn { background: none; border: none; color: var(--muted); cursor: pointer; padding: 4px; border-radius: 6px; transition: color 0.15s; font-size: 12px; }
        .logout-btn:hover { color: var(--danger); }
        main { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; z-index: 1; }
        .topbar { height: 52px; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--border); gap: 12px; flex-shrink: 0; }
        .menu-btn { display: none; background: none; border: none; color: var(--muted); cursor: pointer; width: 34px; height: 34px; border-radius: 8px; align-items: center; justify-content: center; font-size: 13px; transition: all 0.15s; }
        .menu-btn:hover { background: rgba(255,255,255,0.05); color: var(--text); }
        #current-chat-title { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; color: #8899bb; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .model-badge { background: rgba(79,142,255,0.08); border: 1px solid rgba(79,142,255,0.15); border-radius: 20px; padding: 3px 10px; font-size: 10px; color: #5a8adf; font-weight: 500; display: flex; align-items: center; gap: 5px; font-family: 'DM Mono', monospace; }
        .model-badge::before { content: ''; width: 5px; height: 5px; background: #4f8eff; border-radius: 50%; animation: blink 2s ease-in-out infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
        #chat-box { flex: 1; overflow-y: auto; padding: 28px 20px; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-thumb { background: #1a2540; border-radius: 10px; }
        .chat-inner { max-width: 720px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        .welcome { text-align: center; padding: 50px 20px 20px; animation: fadeIn 0.6s ease both; }
        .welcome-icon { width: 60px; height: 60px; background: linear-gradient(135deg, rgba(79,142,255,0.15), rgba(123,94,167,0.15)); border: 1px solid rgba(79,142,255,0.2); border-radius: 18px; display: flex; align-items: center; justify-content: center; margin: 0 auto 18px; font-size: 24px; }
        .welcome h2 { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; color: white; margin-bottom: 8px; }
        .welcome p { font-size: 13px; color: var(--muted); }
        .suggestion-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 24px; }
        .suggestion { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; cursor: pointer; text-align: left; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
        .suggestion:hover { border-color: rgba(79,142,255,0.3); background: rgba(79,142,255,0.05); transform: translateY(-1px); }
        .suggestion-icon { font-size: 14px; margin-bottom: 5px; }
        .suggestion-text { font-size: 12px; color: #8899bb; line-height: 1.4; }
        .message { display: flex; gap: 10px; animation: fadeIn 0.3s ease both; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        .message.user { flex-direction: row-reverse; }
        .msg-avatar { width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; margin-top: 2px; }
        .msg-avatar.ai { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; font-weight: 700; box-shadow: 0 0 10px rgba(79,142,255,0.2); }
        .msg-avatar.user-av { background: #1a2540; border: 1px solid rgba(79,142,255,0.2); color: #6b9fff; }
        .msg-bubble { max-width: 75%; padding: 11px 14px; border-radius: 14px; font-size: 14px; line-height: 1.65; }
        .message.user .msg-bubble { background: var(--user-bg); border: 1px solid rgba(79,142,255,0.15); color: #c8d8f5; border-radius: 14px 4px 14px 14px; }
        .message.ai .msg-bubble { background: var(--ai-bg); border: 1px solid var(--border); color: var(--text); border-radius: 4px 14px 14px 14px; }
        .typing-dots { display: flex; gap: 5px; padding: 4px 0; align-items: center; }
        .typing-dots span { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; opacity: 0.4; animation: dot 1.4s ease-in-out infinite; }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dot { 0%,60%,100%{opacity:0.2;transform:scale(0.8)} 30%{opacity:1;transform:scale(1.1)} }
        .input-area { padding: 14px 20px 18px; flex-shrink: 0; }
        .input-wrap { max-width: 720px; margin: 0 auto; }
        .input-box { display: flex; align-items: flex-end; gap: 10px; background: var(--surface); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 9px 9px 9px 14px; transition: border-color 0.2s, box-shadow 0.2s; }
        .input-box:focus-within { border-color: rgba(79,142,255,0.4); box-shadow: 0 0 0 3px rgba(79,142,255,0.07); }
        #user-input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif; resize: none; max-height: 160px; min-height: 24px; line-height: 1.5; padding: 3px 0; }
        #user-input::placeholder { color: #2d3d5a; }
        #send-btn { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 9px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; transition: all 0.2s; box-shadow: 0 4px 12px rgba(79,142,255,0.3); }
        #send-btn:hover { transform: scale(1.05); box-shadow: 0 6px 18px rgba(79,142,255,0.4); }
        #send-btn:active { transform: scale(0.95); }
        #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
        .input-hint { font-size: 10px; color: #2a3a55; text-align: center; margin-top: 7px; font-family: 'DM Mono', monospace; }
        #error-msg { font-size: 12px; color: var(--danger); text-align: center; margin-top: 7px; display: none; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 500; display: none; align-items: center; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .modal { background: #0e1828; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 24px; width: 100%; max-width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); animation: modalIn 0.25s cubic-bezier(0.16,1,0.3,1) both; }
        @keyframes modalIn { from{opacity:0;transform:scale(0.92)} to{opacity:1;transform:scale(1)} }
        .modal h3 { font-family: 'Syne', sans-serif; font-size: 16px; color: white; margin-bottom: 6px; }
        .modal p { font-size: 13px; color: var(--muted); margin-bottom: 18px; }
        .modal input { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 9px; padding: 11px 14px; font-size: 13px; color: var(--text); font-family: 'DM Sans', sans-serif; outline: none; margin-bottom: 14px; transition: border-color 0.2s; }
        .modal input:focus { border-color: rgba(79,142,255,0.4); }
        .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
        .modal-btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.15s; border: none; }
        .modal-btn.cancel { background: rgba(255,255,255,0.06); color: var(--muted); }
        .modal-btn.cancel:hover { color: var(--text); }
        .modal-btn.confirm { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; }
        .modal-btn.confirm:hover { opacity: 0.9; }
        .modal-btn.danger-confirm { background: rgba(248,113,113,0.15); color: var(--danger); border: 1px solid rgba(248,113,113,0.3); }
        .modal-btn.danger-confirm:hover { background: rgba(248,113,113,0.25); }
        @media (max-width: 768px) {
            #sidebar { position: fixed; left: 0; top: 0; z-index: 100; transform: translateX(-100%); }
            #sidebar.open { transform: translateX(0); }
            .menu-btn { display: flex; }
            .suggestion-grid { grid-template-columns: 1fr; }
            .msg-bubble { max-width: 88%; }
        }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; backdrop-filter: blur(2px); }
        #overlay.show { display: block; }
    </style>
</head>
<body>
    <div class="ambient ambient-1"></div>
    <div class="ambient ambient-2"></div>
    <div id="overlay" onclick="toggleSidebar()"></div>
    <div class="ctx-menu" id="ctx-menu" style="display:none;"></div>

    <div class="modal-overlay" id="rename-modal">
        <div class="modal">
            <h3 id="rename-modal-title">Rename</h3>
            <p id="rename-modal-sub">Enter a new name</p>
            <input type="text" id="rename-input" placeholder="New name...">
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeModal('rename-modal')">Cancel</button>
                <button class="modal-btn confirm" onclick="confirmRename()">Rename</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="delete-modal">
        <div class="modal">
            <h3>Delete?</h3>
            <p id="delete-modal-msg">This action cannot be undone.</p>
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeModal('delete-modal')">Cancel</button>
                <button class="modal-btn danger-confirm" onclick="confirmDelete()">Delete</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="move-modal">
        <div class="modal">
            <h3>Move to Project</h3>
            <p>Select a project for this chat</p>
            <div id="move-project-list" style="margin-bottom:14px;"></div>
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeModal('move-modal')">Cancel</button>
            </div>
        </div>
    </div>

    <aside id="sidebar">
        <div class="sidebar-header">
            <div class="logo-mark">
                <div class="logo-icon">⚡</div>
                <div class="logo-text">Auri<span>taker</span></div>
            </div>
            <div class="sidebar-actions">
                <button class="new-chat-btn" onclick="newChat()"><i class="fas fa-plus"></i> New Chat</button>
                <button class="new-project-btn" onclick="createProject()"><i class="fas fa-folder-plus"></i> Project</button>
            </div>
        </div>
        <div id="history-list"></div>
        <div class="sidebar-footer">
            <div class="user-chip">
                <div class="avatar">A</div>
                <div class="user-info">
                    <div class="user-email" id="user-email">User</div>
                    <div class="user-plan">Auritaker v1</div>
                </div>
                <button class="logout-btn" onclick="logout()" title="Sign out"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
    </aside>

    <main>
        <header class="topbar">
            <button class="menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
            <div id="current-chat-title">Auritaker AI</div>
            <div class="model-badge">Auto · Free</div>
        </header>
        <div id="chat-box">
            <div class="chat-inner" id="chat-inner">
                <div class="welcome" id="welcome-screen">
                    <div class="welcome-icon">⚡</div>
                    <h2>What's on your mind?</h2>
                    <p>Ask me anything — I search the web when needed.</p>
                    <div class="suggestion-grid">
                        <button class="suggestion" onclick="useSuggestion(this)"><div class="suggestion-icon">🏏</div><div class="suggestion-text">What's the main sport talk in cricket today?</div></button>
                        <button class="suggestion" onclick="useSuggestion(this)"><div class="suggestion-icon">⚽</div><div class="suggestion-text">Latest football transfer news</div></button>
                        <button class="suggestion" onclick="useSuggestion(this)"><div class="suggestion-icon">🏀</div><div class="suggestion-text">NBA scores from last night</div></button>
                        <button class="suggestion" onclick="useSuggestion(this)"><div class="suggestion-icon">🎾</div><div class="suggestion-text">Who won the latest Grand Slam?</div></button>
                    </div>
                </div>
            </div>
        </div>
        <div class="input-area">
            <div class="input-wrap">
                <div class="input-box">
                    <textarea id="user-input" placeholder="Ask anything..." rows="1" autocomplete="off"></textarea>
                    <button id="send-btn" onclick="sendMessage()"><i class="fas fa-arrow-up"></i></button>
                </div>
                <div class="input-hint">AURITAKER · WEB-ENHANCED · AI</div>
                <div id="error-msg"></div>
            </div>
        </div>
    </main>

    <script>
        const BACKEND_URL = 'https://auritaker.onrender.com';
        let currentChatId = null;
        let isLoading = false;
        let ctxTarget = null;
        let pendingAction = null;

        function getData() {
            return {
                chats: JSON.parse(localStorage.getItem('auri_chats') || '[]'),
                projects: JSON.parse(localStorage.getItem('auri_projects') || '[]')
            };
        }
        function saveData(data) {
            localStorage.setItem('auri_chats', JSON.stringify(data.chats));
            localStorage.setItem('auri_projects', JSON.stringify(data.projects));
        }

        const email = localStorage.getItem('auritaker_user');
        if (email) document.getElementById('user-email').innerText = email;
        renderSidebar();

        const textarea = document.getElementById('user-input');
        textarea.addEventListener('input', () => {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 160) + 'px';
        });
        textarea.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }

        function logout() {
            fetch(BACKEND_URL + '/logout', { credentials: 'include' });
            localStorage.removeItem('auritaker_logged_in');
            localStorage.removeItem('auritaker_user');
            window.location.href = BACKEND_URL + '/login';
        }

        function useSuggestion(el) {
            textarea.value = el.querySelector('.suggestion-text').innerText;
            textarea.dispatchEvent(new Event('input'));
            sendMessage();
        }

        // ── Sidebar ──
        function renderSidebar() {
            const { chats, projects } = getData();
            const list = document.getElementById('history-list');
            list.innerHTML = '';

            if (projects.length > 0) {
                const projLabel = document.createElement('div');
                projLabel.className = 'section-label';
                projLabel.textContent = 'Projects';
                list.appendChild(projLabel);

                projects.forEach(proj => {
                    const projChats = chats.filter(c => c.projectId === proj.id);
                    const group = document.createElement('div');
                    group.className = 'project-group' + (proj.open ? ' open' : '');
                    group.innerHTML = `
                        <div class="project-header" onclick="toggleProject(${proj.id})">
                            <i class="fas fa-chevron-right project-chevron"></i>
                            <span class="project-icon">${proj.emoji || '📁'}</span>
                            <span class="project-name">${proj.name}</span>
                            <span class="project-count">${projChats.length}</span>
                            <button class="item-menu-btn" onclick="openCtxMenu(event,'project',${proj.id})">
                                <i class="fas fa-ellipsis"></i>
                            </button>
                        </div>
                        <div class="project-chats" id="proj-chats-${proj.id}"></div>
                    `;
                    list.appendChild(group);
                    const chatContainer = group.querySelector('.project-chats');
                    projChats.forEach(chat => chatContainer.appendChild(makeChatItem(chat)));
                });
            }

            const freeChats = chats.filter(c => !c.projectId);
            if (freeChats.length > 0) {
                const chatLabel = document.createElement('div');
                chatLabel.className = 'section-label';
                chatLabel.textContent = projects.length > 0 ? 'Other Chats' : 'Recent';
                list.appendChild(chatLabel);
                freeChats.slice().reverse().forEach(chat => list.appendChild(makeChatItem(chat)));
            }

            if (chats.length === 0 && projects.length === 0) {
                list.innerHTML = '<p style="font-size:12px;color:#2d3d5a;padding:12px 10px;">No chats yet</p>';
            }
        }

        function makeChatItem(chat) {
            const div = document.createElement('div');
            div.className = `chat-item ${chat.id === currentChatId ? 'active' : ''}`;
            div.innerHTML = `
                <i class="fas fa-message chat-icon"></i>
                <span class="chat-title">${chat.title}</span>
                <button class="item-menu-btn" onclick="openCtxMenu(event,'chat',${chat.id})">
                    <i class="fas fa-ellipsis"></i>
                </button>
            `;
            div.onclick = e => {
                if (e.target.closest('.item-menu-btn')) return;
                loadChat(chat.id);
                if (window.innerWidth < 768) toggleSidebar();
            };
            return div;
        }

        function toggleProject(id) {
            const data = getData();
            const proj = data.projects.find(p => p.id === id);
            if (proj) proj.open = !proj.open;
            saveData(data);
            renderSidebar();
        }

        // ── Context Menu ──
        function openCtxMenu(e, type, id) {
            e.stopPropagation();
            closeCtxMenu();
            ctxTarget = { type, id };

            const menu = document.getElementById('ctx-menu');
            const { projects } = getData();
            let items = '';

            if (type === 'chat') {
                items = `
                    <div class="ctx-item" onclick="startRename()"><i class="fas fa-pen"></i> Rename</div>
                    ${projects.length > 0 ? `<div class="ctx-item" onclick="openMoveModal()"><i class="fas fa-folder-arrow-up"></i> Move to Project</div>` : ''}
                    <div class="ctx-divider"></div>
                    <div class="ctx-item danger" onclick="startDelete()"><i class="fas fa-trash"></i> Delete</div>
                `;
            } else {
                items = `
                    <div class="ctx-item" onclick="startRename()"><i class="fas fa-pen"></i> Rename</div>
                    <div class="ctx-divider"></div>
                    <div class="ctx-item danger" onclick="startDelete()"><i class="fas fa-trash"></i> Delete Project</div>
                `;
            }

            menu.innerHTML = items;
            menu.style.display = 'block';

            const rect = e.target.closest('.item-menu-btn').getBoundingClientRect();
            let x = rect.right + 4;
            let y = rect.top;
            if (x + 170 > window.innerWidth) x = rect.left - 174;
            if (y + 150 > window.innerHeight) y = window.innerHeight - 160;
            menu.style.left = x + 'px';
            menu.style.top = y + 'px';

            setTimeout(() => document.addEventListener('click', closeCtxMenu, { once: true }), 0);
        }

        function closeCtxMenu() {
            document.getElementById('ctx-menu').style.display = 'none';
        }

        // ── Rename ──
        function startRename() {
            pendingAction = { ...ctxTarget };
            closeCtxMenu();
            const { chats, projects } = getData();
            const isProject = pendingAction.type === 'project';
            const item = isProject
                ? projects.find(p => p.id === pendingAction.id)
                : chats.find(c => c.id === pendingAction.id);
            if (!item) return;
            document.getElementById('rename-modal-title').textContent = isProject ? 'Rename Project' : 'Rename Chat';
            document.getElementById('rename-modal-sub').textContent = isProject ? 'Enter a new project name' : 'Enter a new chat name';
            document.getElementById('rename-input').value = item.name || item.title;
            document.getElementById('rename-modal').classList.add('show');
            document.getElementById('rename-input').focus();
        }

        function confirmRename() {
            const val = document.getElementById('rename-input').value.trim();
            if (!val) return;
            const data = getData();
            if (pendingAction.type === 'project') {
                const proj = data.projects.find(p => p.id === pendingAction.id);
                if (proj) proj.name = val;
            } else {
                const chat = data.chats.find(c => c.id === pendingAction.id);
                if (chat) {
                    chat.title = val;
                    if (chat.id === currentChatId) document.getElementById('current-chat-title').textContent = val;
                }
            }
            saveData(data);
            closeModal('rename-modal');
            renderSidebar();
        }

        // ── Delete ──
        function startDelete() {
            pendingAction = { ...ctxTarget };
            closeCtxMenu();
            const { chats, projects } = getData();
            const isProject = pendingAction.type === 'project';
            const item = isProject
                ? projects.find(p => p.id === pendingAction.id)
                : chats.find(c => c.id === pendingAction.id);
            if (!item) return;
            document.getElementById('delete-modal-msg').textContent = isProject
                ? `Delete project "${item.name}"? Chats inside will become unorganized.`
                : `Delete "${item.title}"? This cannot be undone.`;
            document.getElementById('delete-modal').classList.add('show');
        }

        function confirmDelete() {
            const data = getData();
            if (pendingAction.type === 'project') {
                data.chats.forEach(c => { if (c.projectId === pendingAction.id) c.projectId = null; });
                data.projects = data.projects.filter(p => p.id !== pendingAction.id);
            } else {
                data.chats = data.chats.filter(c => c.id !== pendingAction.id);
                if (pendingAction.id === currentChatId) newChat();
            }
            saveData(data);
            closeModal('delete-modal');
            renderSidebar();
        }

        // ── Move to Project ──
        function openMoveModal() {
            pendingAction = { ...ctxTarget };
            closeCtxMenu();
            const { projects } = getData();
            const container = document.getElementById('move-project-list');
            container.innerHTML = '';

            if (projects.length === 0) {
                container.innerHTML = '<p style="font-size:12px;color:#4a5568;">No projects yet. Create one first.</p>';
            } else {
                projects.forEach(proj => {
                    const btn = document.createElement('button');
                    btn.style.cssText = 'width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:10px 12px;cursor:pointer;text-align:left;color:#8899bb;font-size:13px;font-family:DM Sans,sans-serif;margin-bottom:6px;transition:all 0.15s;display:flex;align-items:center;gap:8px;';
                    btn.innerHTML = `<span>${proj.emoji || '📁'}</span> <span>${proj.name}</span>`;
                    btn.onmouseover = () => btn.style.background = 'rgba(79,142,255,0.1)';
                    btn.onmouseout = () => btn.style.background = 'rgba(255,255,255,0.04)';
                    btn.onclick = () => {
                        const data = getData();
                        const chat = data.chats.find(c => c.id === pendingAction.id);
                        if (chat) chat.projectId = proj.id;
                        saveData(data);
                        closeModal('move-modal');
                        renderSidebar();
                    };
                    container.appendChild(btn);
                });

                const removeBtn = document.createElement('button');
                removeBtn.style.cssText = 'width:100%;background:none;border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:10px 12px;cursor:pointer;text-align:left;color:#4a5568;font-size:12px;font-family:DM Sans,sans-serif;margin-top:4px;';
                removeBtn.textContent = '✕ Remove from project';
                removeBtn.onclick = () => {
                    const data = getData();
                    const chat = data.chats.find(c => c.id === pendingAction.id);
                    if (chat) chat.projectId = null;
                    saveData(data);
                    closeModal('move-modal');
                    renderSidebar();
                };
                container.appendChild(removeBtn);
            }

            document.getElementById('move-modal').classList.add('show');
        }

        // ── Projects ──
        const PROJECT_EMOJIS = ['📁','🚀','💡','🎯','📚','🔬','💼','🎨','⚡','🌐'];
        function createProject() {
            const name = prompt('Project name:');
            if (!name || !name.trim()) return;
            const data = getData();
            data.projects.push({
                id: Date.now(),
                name: name.trim(),
                emoji: PROJECT_EMOJIS[Math.floor(Math.random() * PROJECT_EMOJIS.length)],
                open: true
            });
            saveData(data);
            renderSidebar();
        }

        // ── Chat ──
        function newChat() {
            currentChatId = null;
            const inner = document.getElementById('chat-inner');
            inner.innerHTML = `
                <div class="welcome" id="welcome-screen">
                    <div class="welcome-icon">⚡</div>
                    <h2>What's on your mind?</h2>
                    <p>Ask me anything — I search the web when needed.</p>
                    <div class="suggestion-grid">
                        <button class="suggestion" onclick="useSuggestion(this)"><div class="suggestion-icon">🏏</div><div class="suggestion-text">What's the main sport talk in cricket today?</div></button>
                        <button class="suggestion" onclick="useSuggestion(this)"><div class="suggestion-icon">⚽</div><div class="suggestion-text">Latest football transfer news</div></button>
                        <button class="suggestion" onclick="useSuggestion(this)"><div class="suggestion-icon">🏀</div><div class="suggestion-text">NBA scores from last night</div></button>
                        <button class="suggestion" onclick="useSuggestion(this)"><div class="suggestion-icon">🎾</div><div class="suggestion-text">Who won the latest Grand Slam?</div></button>
                    </div>
                </div>`;
            document.getElementById('current-chat-title').textContent = 'Auritaker AI';
            renderSidebar();
        }

        function loadChat(id) {
            currentChatId = id;
            const { chats } = getData();
            const chat = chats.find(c => c.id === id);
            if (!chat) return;
            document.getElementById('current-chat-title').textContent = chat.title;
            const inner = document.getElementById('chat-inner');
            inner.innerHTML = '';
            chat.messages.forEach(m => appendMessage(m.role, m.text));
            renderSidebar();
        }

        // ── Messages ──
        function appendMessage(role, text) {
            const welcome = document.getElementById('welcome-screen');
            if (welcome) welcome.remove();
            const inner = document.getElementById('chat-inner');
            const wrap = document.createElement('div');
            wrap.className = `message ${role === 'user' ? 'user' : 'ai'}`;
            const avatarHTML = role === 'user'
                ? `<div class="msg-avatar user-av"><i class="fas fa-user" style="font-size:10px;"></i></div>`
                : `<div class="msg-avatar ai">A</div>`;
            let formatted = text
                .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
                .replace(/`([^`]+)`/g,'<code style="background:rgba(79,142,255,0.1);padding:2px 6px;border-radius:4px;font-size:12px;color:#7eb3ff;font-family:DM Mono,monospace;">$1</code>')
                .replace(/\n/g,'<br>');
            wrap.innerHTML = `${avatarHTML}<div class="msg-bubble">${formatted}</div>`;
            inner.appendChild(wrap);
            document.getElementById('chat-box').scrollTop = 99999;
        }

        function showTyping() {
            const welcome = document.getElementById('welcome-screen');
            if (welcome) welcome.remove();
            const inner = document.getElementById('chat-inner');
            const wrap = document.createElement('div');
            wrap.className = 'message ai';
            wrap.id = 'typing-indicator';
            wrap.innerHTML = `<div class="msg-avatar ai">A</div><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
            inner.appendChild(wrap);
            document.getElementById('chat-box').scrollTop = 99999;
        }

        function removeTyping() {
            const t = document.getElementById('typing-indicator');
            if (t) t.remove();
        }

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 5000);
        }

        // ── Send ──
        async function sendMessage() {
            if (isLoading) return;
            const text = textarea.value.trim();
            if (!text) return;
            if (!currentChatId) currentChatId = Date.now();
            appendMessage('user', text);
            const data = getData();
            let chat = data.chats.find(c => c.id === currentChatId);
            if (!chat) {
                chat = { id: currentChatId, title: text.substring(0, 32), messages: [], projectId: null };
                data.chats.push(chat);
            }
            chat.messages.push({ role: 'user', text });
            saveData(data);
            textarea.value = '';
            textarea.style.height = 'auto';
            renderSidebar();
            isLoading = true;
            document.getElementById('send-btn').disabled = true;
            showTyping();
            try {
                const res = await fetch(BACKEND_URL + '/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text }),
                    credentials: 'include'
                });
                const json = await res.json();
                removeTyping();
                if (res.ok && json.response) {
                    appendMessage('assistant', json.response);
                    const d = getData();
                    const c = d.chats.find(x => x.id === currentChatId);
                    if (c) { c.messages.push({ role: 'assistant', text: json.response }); saveData(d); }
                    document.getElementById('current-chat-title').textContent = chat.title;
                    renderSidebar();
                } else {
                    appendMessage('assistant', '❌ ' + (json.response || 'Something went wrong'));
                }
            } catch (err) {
                removeTyping();
                appendMessage('assistant', '❌ Connection error. Is the server running?');
                showError('Connection error: ' + err.message);
            } finally {
                isLoading = false;
                document.getElementById('send-btn').disabled = false;
            }
        }

        // ── Modals ──
        function closeModal(id) {
            document.getElementById(id).classList.remove('show');
        }

        document.getElementById('rename-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') confirmRename();
            if (e.key === 'Escape') closeModal('rename-modal');
        });

        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', e => {
                if (e.target === overlay) overlay.classList.remove('show');
            });
        });
    </script>
</body>
</html>
